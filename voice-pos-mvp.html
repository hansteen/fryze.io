<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>POS Core v3 (Real Model)- RH</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}
.box{background:#fff;padding:15px;border-radius:10px}
.row{display:flex;justify-content:space-between;margin:6px 0}
.small{font-size:12px;color:#666}
button{padding:10px;margin-right:10px}
.start{background:#0077cc;color:#fff}
.stop{background:#cc3333;color:#fff}
</style>
</head>

<body>

<h2>?? POS Core v3 (Real Model)- RH</h2>

<button class="start" onclick="startVoice()">?? Start</button>
<button class="stop" onclick="stopVoice()">?? Stop</button>

<div id="status">bereit</div>
<div id="speech">—</div>

<div class="box">
<h3>?? Bestellung</h3>
<div id="order"></div>
<h3 id="total">0,00 €</h3>
</div>

<script>

// ===================== DATA =====================

const SHEET_ID = "1yCC-8iwWWHPUejZcoc92U-Qy3RMPa1s2nUswYrsLYx4";

let artikel = {};
let modifier = {};

let order = {
  positions: []
};

let recognition;
let isListening = false;
let lastText = "";

// ===================== LOAD SHEETS =====================

async function loadArticles(){

  const res = await fetch(`https://opensheet.elk.sh/${SHEET_ID}/Artikel`);
  const data = await res.json();

  data.forEach(a => {
    artikel[a.Nummer] = {
      name: a.Name,
      price: parseFloat(a.Preis)
    };
  });
}

async function loadModifiers(){

  const res = await fetch(`https://opensheet.elk.sh/${SHEET_ID}/Modifier`);
  const data = await res.json();

  data.forEach(m => {

    const aliases = (m.VoiceAlias || "").split(",");

    aliases.forEach(a => {

      modifier[a.trim().toLowerCase()] = {
        name: m.Name,
        price: parseFloat(m.Preis || 0)
      };

    });

  });
}

loadArticles();
loadModifiers();

// ===================== CORE =====================

function addPosition(pos){

  order.positions.push(pos);
  render();
}

function render(){

  let el = document.getElementById("order");
  el.innerHTML = "";

  let total = 0;

  order.positions.forEach(p => {

    let base = artikel[p.id];
    if(!base) return;

    let modSum = 0;
    let modText = "";

    (p.modifiers || []).forEach(mKey => {

      let m = modifier[mKey];
      if(m){
        modSum += m.price;
        modText += m.name + " ";
      }

    });

    let sum = p.qty * (base.price + modSum);
    total += sum;

    el.innerHTML += `
      <div class="row">
        <div>
          ${p.qty}x ${base.name}
          <div class="small">${modText}</div>
        </div>
        <div>${sum.toFixed(2)} €</div>
      </div>
    `;
  });

  document.getElementById("total").innerText =
    total.toFixed(2) + " €";
}

// ===================== VOICE =====================

function parse(text){

  text = text.toLowerCase();

  if(text.includes("stop")){
    stopVoice();
    return;
  }

  let mods = [];

  Object.keys(modifier).forEach(k => {
    if(text.includes(k)){
      mods.push(k);
    }
  });

  let match = text.match(/(\d+)\s*(?:mal)?\s*(?:die\s*)?(\d+)/);

  if(match){

    let qty = parseInt(match[1]);
    let id = match[2];

    addPosition({
      id,
      qty,
      modifiers: mods
    });

  } else {

    let single = text.match(/(\d+)/);

    if(single && artikel[single[1]]){

      addPosition({
        id: single[1],
        qty: 1,
        modifiers: mods
      });

    }
  }
}

// ===================== VOICE ENGINE =====================

function startVoice(){

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();

  recognition.lang = "de-DE";
  recognition.continuous = true;

  recognition.onresult = (e) => {

    let text = e.results[e.results.length-1][0].transcript;

    if(text === lastText) return;
    lastText = text;

    document.getElementById("speech").innerText = text;

    parse(text);
  };

  recognition.onstart = () => {
    isListening = true;
    document.getElementById("status").innerText = "?? aktiv";
  };

  recognition.onend = () => {
    if(isListening) recognition.start();
  };

  recognition.start();
}

function stopVoice(){
  isListening = false;
  recognition.stop();
  document.getElementById("status").innerText = "gestoppt";
}

</script>

</body>
</html>
