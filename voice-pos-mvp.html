<!DOCTYPE html>
<html lang="de">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Voice POS</title>
<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.box{background:#fff;border-radius:10px;padding:15px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.row{display:flex;justify-content:space-between;margin:6px 0}
.small{font-size:12px;color:#666}
button{padding:10px 14px;margin-right:8px}
</style></head>
<body>
<h2>Voice POS</h2>
<button onclick="startVoice()">🎤 Start</button>
<button onclick="stopVoice()">🛑 Stop</button>
<div id="status">bereit</div>
<div id="speech">—</div><br>

<div class="grid">
<div class="box"><h3>Artikel</h3><div id="menu"></div></div>
<div class="box"><h3>Bestellung</h3><div id="order"></div><h3 id="sum">0,00 €</h3></div>
<div class="box"><h3>Bons</h3><div id="receipts"></div></div>
</div>

<script>
const SHEET_ID="1yCC-8iwWWHPUejZcoc92U-Qy3RMPa1s2nUswYrsLYx4";
const ARTICLE_URL=`https://opensheet.elk.sh/${SHEET_ID}/Artikel`;
const MODIFIER_URL=`https://opensheet.elk.sh/${SHEET_ID}/Modifier`;

let artikel={},modifier={},positions=[],history=[],orderNo=1;
let recognition,isListening=false,lastText="";

const eur=v=>v.toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2})+" €";

async function init(){
 let a=await fetch(ARTICLE_URL).then(r=>r.json());
 a.forEach(x=>artikel[x.Nummer]={name:x.Name,price:+x.Preis,category:x.Kategorie||""});
 let m=await fetch(MODIFIER_URL).then(r=>r.json());
 m.forEach(x=>{
   (x.VoiceAlias||"").split(",").forEach(v=>{
      modifier[v.trim().toLowerCase()]={name:x.Name,price:+x.Preis||0};
   });
 });
 renderMenu();
}
function renderMenu(){
 let h="";
 Object.keys(artikel).forEach(id=>{
   let a=artikel[id];
   h+=`<div class="row"><span>${id} ${a.name}</span><span>${eur(a.price)}</span></div>`;
 });
 document.getElementById("menu").innerHTML=h;
}
function addPosition(id,qty,mods){
 positions.push({id,qty,mods});
 history.push({id,qty,mods});
 renderOrder();
}
function renderOrder(){
 let html="",total=0;
 positions.forEach(p=>{
   const item=artikel[p.id]; if(!item) return;
   const modTotal=p.mods.reduce((s,m)=>s+m.price,0);
   const posTotal=(item.price+modTotal)*p.qty;
   total+=posTotal;
   html+=`<div style="border-bottom:1px solid #ddd;padding:6px 0">
     <div class="row"><span>${p.qty}x ${item.name}</span><span>${eur(posTotal)}</span></div>
     ${p.mods.map(m=>`<div class="small">+ ${m.name} (${eur(m.price)})</div>`).join("")}
   </div>`;
 });
 document.getElementById("order").innerHTML=html;
 document.getElementById("sum").innerText=eur(total);
}
function parse(text){
 text=text.toLowerCase();
 if(text.includes("korrektur")){
   if(history.length){ history.pop(); positions.pop(); renderOrder(); }
   return;
 }
 if(text.includes("bestellung abschließen")){
   let total=document.getElementById("sum").innerText;
   let bon=`<div><b>Bestellung ${orderNo}</b>${document.getElementById("order").innerHTML}<b>Gesamt ${total}</b><hr></div>`;
   document.getElementById("receipts").innerHTML=bon+document.getElementById("receipts").innerHTML;
   orderNo++; positions=[]; history=[]; renderOrder(); return;
 }
 text=text.replace("einmal","1 mal").replace("zweimal","2 mal").replace("dreimal","3 mal").replace("nummer","");
 let mods=[];
 Object.keys(modifier).forEach(k=>{ if(text.includes(k)) mods.push(modifier[k]); });
 let m=text.match(/(\d+)\s*mal\s*(\d+)/) || text.match(/(\d+)/);
 if(m){
   let qty=1,id;
   if(m.length===3){qty=parseInt(m[1]); id=m[2];}
   else id=m[1];
   if(artikel[id]) addPosition(id,qty,mods);
 }
}
function startVoice(){
 const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
 recognition=new SR();
 recognition.lang="de-DE"; recognition.continuous=true;
 recognition.onresult=e=>{
   const t=e.results[e.results.length-1][0].transcript.trim();
   if(t===lastText) return; lastText=t;
   speech.innerText=t; parse(t);
 };
 recognition.onstart=()=>status.innerText="🎤 aktiv";
 recognition.onend=()=>{ if(isListening) recognition.start(); };
 isListening=true; recognition.start();
}
function stopVoice(){ isListening=false; recognition&&recognition.stop(); status.innerText="🛑 gestoppt"; }
init();
</script></body></html>
