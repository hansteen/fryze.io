<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<title>Voice POS System</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #ffffff;
  color: #111;
  margin: 0;
  padding: 20px;
}

h1, h2 {
  color: #111;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 15px;
}

.box {
  background: #f7f7f7;
  border: 1px solid #ddd;
  padding: 15px;
  border-radius: 10px;
  min-height: 320px;
}

.item {
  padding: 6px;
  border-bottom: 1px solid #ddd;
  font-size: 14px;
}

.num {
  font-weight: bold;
  margin-right: 6px;
  color: #666;
}

button {
  padding: 10px;
  margin-right: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

#start { background: #28a745; color: white; }
#stop { background: #dc3545; color: white; }

.bon {
  background: white;
  border: 1px solid #ddd;
  border-left: 4px solid #ffcc00;
  padding: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>?? Voice POS System</h1>

<button id="start">Start Voice</button>
<button id="stop">Stop</button>

<div class="container">

  <div class="box">
    <h2>?? Artikel</h2>
    <div id="articles"></div>
  </div>

  <div class="box">
    <h2>?? Modifier</h2>
    <div id="modifiers"></div>
  </div>

  <div class="box">
    <h2>?? Bestellung</h2>
    <div id="orders"></div>
  </div>

  <div class="box">
    <h2>?? Bons</h2>
    <div id="bons"></div>
  </div>

</div>

<script>
const API_KEY = " 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";

// ?? Google Sheets CSV URLs
const ARTICLES_URL = "ARTIKEL_CSV_URL_HIER";
const MODIFIERS_URL = "MODIFIER_CSV_URL_HIER";

let articles = [];
let modifiers = [];
let orders = [];
let bons = [];

const articlesEl = document.getElementById("articles");
const modifiersEl = document.getElementById("modifiers");
const ordersEl = document.getElementById("orders");
const bonsEl = document.getElementById("bons");

// ?? CSV Loader
async function loadCSV(url) {
  const res = await fetch(url);
  const text = await res.text();

  return text
    .split("\n")
    .map(r => r.split(",")[0])
    .filter(Boolean);
}

// ?? Daten laden
async function loadData() {
  articles = await loadCSV(ARTICLES_URL);
  modifiers = await loadCSV(MODIFIERS_URL);
  render();
}

// ??? UI Render (richtige Reihenfolge)
function render() {
  articlesEl.innerHTML = articles
    .map((a, i) => `<div class="item"><span class="num">${i+1}</span>${a}</div>`)
    .join("");

  modifiersEl.innerHTML = modifiers
    .map((m, i) => `<div class="item"><span class="num">${i+1}</span>${m}</div>`)
    .join("");

  ordersEl.innerHTML = orders
    .map(o => `<div class="item">?? ${o.qty}x ${o.name}</div>`)
    .join("");

  bonsEl.innerHTML = bons
    .map(b => `<div class="bon">${b}</div>`)
    .join("");
}

// ?? Speech Recognition
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "de-DE";
recognition.continuous = true;

recognition.onresult = async (e) => {
  const text = e.results[e.results.length - 1][0].transcript;
  await sendToAI(text);
};

// ?? OpenAI
async function sendToAI(text) {
  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + API_KEY
    },
    body: JSON.stringify({
      model: "gpt-4.1-mini",
      messages: [
        {
          role: "system",
          content: `
Du bist ein POS-System.

Erkenne:
- Bestellung
- Artikel
- Modifier

Gib NUR JSON zurück:

{
  "order": {
    "qty": 1,
    "name": "",
    "items": []
  },
  "bon": ""
}
          `
        },
        { role: "user", content: text }
      ],
      temperature: 0.2
    })
  });

  const data = await res.json();
  const msg = data.choices[0].message.content;

  try {
    const parsed = JSON.parse(msg);

    if (parsed.order) orders.push(parsed.order);
    if (parsed.bon) bons.push(parsed.bon);

    render();

  } catch (e) {
    console.log("JSON Fehler:", msg);
  }
}

// ??? Buttons
document.getElementById("start").onclick = () => recognition.start();
document.getElementById("stop").onclick = () => recognition.stop();

// ?? Start
loadData();
</script>

</body>
</html>
