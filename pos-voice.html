// =========================
// STATE
// =========================
let articles = [];
let modifiers = [];
let orders = [];
let bons = [];

// =========================
// STATE MACHINE
// =========================
const STATE = {
  OPEN: "OPEN",
  MODIFIED: "MODIFIED",
  SENT: "SENT_TO_KITCHEN",
  CLOSED: "CLOSED"
};

// =========================
// LOAD DATA
// =========================
async function loadSheet(url) {
  const res = await fetch(url);
  return await res.json();
}

async function loadData() {
  const a = await loadSheet(ARTICLE_URL);
  const m = await loadSheet(MODIFIER_URL);

  articles = a.map(x => ({
    id: x.Nummer,
    name: x.Name,
    price: x.Preis,
    voice: x.VoiceAlias,
    category: x.Kategorie
  }));

  modifiers = m.map(x => ({
    id: x.Nummer,
    name: x.Name,
    price: x.Preis,
    voice: x.VoiceAlias,
    category: x.Kategorie
  }));

  render();
}

// =========================
// STATE ENGINE
// =========================
function createOrder(item) {
  return {
    id: Date.now(),
    state: STATE.OPEN,
    items: [
      {
        name: item.name,
        qty: 1,
        modifiers: []
      }
    ]
  };
}

function addModifierToOrder(order, mod) {
  order.items[0].modifiers.push(mod.name);
  order.state = STATE.MODIFIED;
}

function sendToKitchen(order) {
  order.state = STATE.SENT;
  bons.push(formatBon(order));
}

// =========================
// BON FORMAT
// =========================
function formatBon(order) {
  let text = `ORDER #${order.id}\nSTATE: ${order.state}\n\n`;

  order.items.forEach(i => {
    text += `${i.qty}x ${i.name}\n`;

    if (i.modifiers.length > 0) {
      text += `  MOD: ${i.modifiers.join(", ")}\n`;
    }
  });

  return text;
}

// =========================
// RENDER
// =========================
function render() {

  // ?? Artikel
  document.getElementById("articles").innerHTML =
    articles.map(a =>
      `<div class="item"><span class="num">${a.id}</span>${a.name}</div>`
    ).join("");

  // ?? Modifier
  document.getElementById("modifiers").innerHTML =
    modifiers.map(m =>
      `<div class="item"><span class="num">${m.id}</span>${m.name}</div>`
    ).join("");

  // ?? Orders
  document.getElementById("orders").innerHTML =
    orders.map(o => {
      let cls = o.state === STATE.OPEN ? "state-open" :
                o.state === STATE.MODIFIED ? "state-modified" :
                "state-sent";

      return `
        <div class="item ${cls}">
          ?? Order ${o.id}<br>
          ${o.items[0].qty}x ${o.items[0].name}<br>
          <small>${o.state}</small>
        </div>
      `;
    }).join("");

  // ?? Bons
  document.getElementById("bons").innerHTML =
    bons.map(b => `<div class="bon">${b}</div>`).join("");
}

// =========================

  return articles.find(a =>
    a.voice?.toLowerCase().includes(text.toLowerCase()) ||
    a.name.toLowerCase().includes(text.toLowerCase())
  );
}

function findModifierByVoice(text) {
  return modifiers.find(m =>
    m.voice?.toLowerCase().includes(text.toLowerCase()) ||
    m.name.toLowerCase().includes(text.toLowerCase())
  );
}
