<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<title>Stable Voice POS vFinal</title>

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }

header {
  background:#111;
  color:#fff;
  padding:10px;
  display:flex;
  gap:10px;
}

button { padding:8px; cursor:pointer; }

#start { background:#28a745; color:#fff; }
#stop { background:#dc3545; color:#fff; }
#finish { background:#ff9800; color:#fff; }

.container {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  height:90vh;
}

.panel, .center, .right {
  padding:10px;
  overflow:auto;
}

.panel { background:#fff; border-right:1px solid #ddd; }
.center { background:#fafafa; border-right:1px solid #ddd; }
.right { background:#fff; }

.item, .mod {
  padding:5px;
  border-bottom:1px solid #eee;
}

.order-item {
  padding:5px;
  border-left:3px solid #2196f3;
  margin-bottom:5px;
}

.bon {
  white-space:pre-wrap;
  background:#fff8dc;
  padding:10px;
  margin-bottom:10px;
  border-left:4px solid gold;
}
</style>
</head>

<body>

<header>
?? Voice POS Stable FINAL
<button id="start">Start</button>
<button id="stop">Stop</button>
<button id="finish">Bestellung abschließen</button>
</header>

<div class="container">

<div class="panel">
<h3>Artikel</h3>
<div id="articles"></div>

<h3>Modifier</h3>
<div id="modifiers"></div>
</div>

<div class="center">
<h3>Bestellung</h3>
<div id="order"></div>
</div>

<div class="right">
<h3>Bons</h3>
<div id="bons"></div>
</div>

</div>

<script>

// =====================
// CONFIG
// =====================
const SHEET_ID = "1yCC-8iwWWHPUejZcoc92U-Qy3RMPa1s2nUswYrsLYx4";
const ARTICLE_URL = `https://opensheet.elk.sh/${SHEET_ID}/Artikel`;
const MODIFIER_URL = `https://opensheet.elk.sh/${SHEET_ID}/Modifier`;

// =====================
// STATE
// =====================
let articles = [];
let modifiers = [];

let currentOrder = { items: [] };
let bons = [];
let bonCounter = 1;

// =====================
// FORMAT
// =====================
function fmt(p){
  return Number(p || 0).toFixed(2);
}

// =====================
// LOAD DATA
// =====================
async function loadData() {

  const a = await fetch(ARTICLE_URL).then(r => r.json());
  const m = await fetch(MODIFIER_URL).then(r => r.json());

  articles = a.map(x => ({
    id: Number(x.Nummer),
    name: x.Name,
    price: Number(x.Preis),
    voice: (x.VoiceAlias || "").toLowerCase()
  }));

  modifiers = m.map(x => ({
    id: Number(x.Nummer),
    name: x.Name,
    price: Number(x.Preis || 0),
    voice: (x.VoiceAlias || "").toLowerCase()
  }));

  render();
}

// =====================
// QTY PARSER
// =====================
function extractQty(text) {

  const map = {
    "eins":1,"ein":1,"eine":1,
    "zwei":2,"zweimal":2,
    "drei":3,"dreimal":3,
    "vier":4
  };

  for (let k in map) {
    if (text.includes(k)) return map[k];
  }

  const num = text.match(/\d+/);
  return num ? parseInt(num[0]) : 1;
}

// =====================
// MODIFIER MATCHING (FIXED)
// =====================
function findModifier(text) {

  return modifiers.find(m => {

    const name = m.name.toLowerCase();
    const aliases = (m.voice || "").split(",").map(a => a.trim().toLowerCase());

    // ID match (103 etc.)
    if (text.includes(String(m.id))) return true;

    // Name match
    if (text.includes(name)) return true;

    // VoiceAlias match
    if (aliases.some(a => text.includes(a))) return true;

    return false;
  });
}

// =====================
// ARTICLE MATCHING
// =====================
function findArticle(text) {

  return articles.find(a =>
    text.includes(String(a.id)) ||
    text.includes(a.name.toLowerCase()) ||
    (a.voice && text.includes(a.voice))
  );
}

// =====================
// RENDER
// =====================
function render() {

  document.getElementById("articles").innerHTML =
    articles.map(a =>
      `<div class="item">
        ${a.id}. ${a.name} (${fmt(a.price)}€)
      </div>`
    ).join("");

  document.getElementById("modifiers").innerHTML =
    modifiers.map(m =>
      `<div class="mod">
        ${m.id}. ${m.name} (+${fmt(m.price)}€)
      </div>`
    ).join("");

  document.getElementById("order").innerHTML =
    currentOrder.items.map(i =>
      `<div class="order-item">
        ${i.qty}x ${i.name} (${fmt(i.price)}€)
        <br><small>${i.modifiers.map(m => m.name).join(", ")}</small>
      </div>`
    ).join("");

  document.getElementById("bons").innerHTML =
    bons.map(b => `<div class="bon">${b}</div>`).join("");
}

// =====================
// TOTAL
// =====================
function calcTotal(order){
  let total = 0;

  order.items.forEach(i => {
    total += i.price * i.qty;
    i.modifiers.forEach(m => total += m.price);
  });

  return total;
}

// =====================
// CLOSE ORDER (SNAPSHOT FIX)
// =====================
function closeOrder(){

  if(currentOrder.items.length === 0) return;

  const snapshot = JSON.parse(JSON.stringify(currentOrder));

  let bon = `BON #${bonCounter}\n-----------------\n`;

  snapshot.items.forEach(i => {
    bon += `${i.qty}x ${i.name} (${fmt(i.price)}€)\n`;

    if(i.modifiers.length){
      bon += ` + ${i.modifiers.map(m => `${m.name} (${fmt(m.price)})`).join(", ")}\n`;
    }
  });

  bon += `-----------------\nTOTAL: ${fmt(calcTotal(snapshot))}€\n`;

  bons.push(bon);
  bonCounter++;

  currentOrder = { items: [] };

  render();
}

// =====================
// VOICE
// =====================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "de-DE";
recognition.continuous = true;

recognition.onresult = (e) => {

  const text = e.results[e.results.length - 1][0].transcript.toLowerCase();

  if(text.includes("bestellung abschließen")){
    closeOrder();
    return;
  }

  const qty = extractQty(text);

  const article = findArticle(text);
  const mod = findModifier(text);

  if(article){
    currentOrder.items.push({
      name: article.name,
      price: article.price,
      qty: qty,
      modifiers: []
    });
  }

  if(mod && currentOrder.items.length){
    currentOrder.items[currentOrder.items.length - 1].modifiers.push(mod);
  }

  render();
};

// =====================
// BUTTONS
// =====================
document.getElementById("start").onclick = () => recognition.start();
document.getElementById("stop").onclick = () => recognition.stop();
document.getElementById("finish").onclick = closeOrder;

// INIT
loadData();

</script>

</body>
</html>
