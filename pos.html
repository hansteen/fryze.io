<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<title>Voice POS Full System</title>

<style>
body {
  font-family: Arial;
  background: #fff;
  color: #111;
  padding: 20px;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 10px;
}

.box {
  border: 1px solid #ddd;
  padding: 10px;
  min-height: 300px;
}

.item {
  padding: 4px;
  border-bottom: 1px solid #eee;
  font-size: 14px;
}

.bon {
  white-space: pre-wrap;
  background: #f7f7f7;
  padding: 8px;
  margin-bottom: 8px;
  border-left: 3px solid #ffcc00;
}

button {
  padding: 10px;
  margin-right: 10px;
}
</style>
</head>

<body>

<h1>Voice POS Full System</h1>

<button id="start">Start</button>
<button id="stop">Stop</button>

<div class="container">

  <div class="box">
    <h3>Artikel</h3>
    <div id="articles"></div>
  </div>

  <div class="box">
    <h3>Modifier</h3>
    <div id="modifiers"></div>
  </div>

  <div class="box">
    <h3>Bestellung</h3>
    <div id="orders"></div>
  </div>

  <div class="box">
    <h3>Bons</h3>
    <div id="bons"></div>
  </div>

</div>

<script>

// =====================
// CONFIG
// =====================
const SHEET_ID = "1yCC-8iwWWHPUejZcoc92U-Qy3RMPa1s2nUswYrsLYx4";

const ARTICLE_URL = `https://opensheet.elk.sh/${SHEET_ID}/Artikel`;
const MODIFIER_URL = `https://opensheet.elk.sh/${SHEET_ID}/Modifier`;

// =====================
// STATE
// =====================
let articles = [];
let modifiers = [];
let orders = [];
let bons = [];

// =====================
// LOAD
// =====================
async function loadData() {

  const a = await fetch(ARTICLE_URL).then(r => r.json());
  const m = await fetch(MODIFIER_URL).then(r => r.json());

  articles = a.map(x => ({
    id: x.Nummer,
    name: x.Name,
    price: x.Preis,
    voice: x.VoiceAlias
  }));

  modifiers = m.map(x => ({
    id: x.Nummer,
    name: x.Name,
    price: x.Preis,
    voice: x.VoiceAlias
  }));

  render();
}

// =====================
// RENDER
// =====================
function render() {

  document.getElementById("articles").innerHTML =
    articles.map(a =>
      `<div class="item">${a.id} - ${a.name} (${a.price}€)</div>`
    ).join("");

  document.getElementById("modifiers").innerHTML =
    modifiers.map(m =>
      `<div class="item">${m.id} - ${m.name}</div>`
    ).join("");

  document.getElementById("orders").innerHTML =
    orders.map(o =>
      `<div class="item">
        ${o.qty}x ${o.name}<br>
        ${o.modifiers.join(", ")}
      </div>`
    ).join("");

  document.getElementById("bons").innerHTML =
    bons.map(b => `<div class="bon">${b}</div>`).join("");
}

// =====================
// VOICE
// =====================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "de-DE";
recognition.continuous = true;

recognition.onresult = (e) => {

  const text = e.results[e.results.length - 1][0].transcript.toLowerCase();

  const article = articles.find(a =>
    text.includes(a.name.toLowerCase()) ||
    text.includes((a.voice || "").toLowerCase())
  );

  const mod = modifiers.find(m =>
    text.includes(m.name.toLowerCase()) ||
    text.includes((m.voice || "").toLowerCase())
  );

  if (article) {
    const order = {
      qty: 1,
      name: article.name,
      modifiers: []
    };

    if (mod) order.modifiers.push(mod.name);

    orders.push(order);

    bons.push(
`BON
${article.name}
Preis: ${article.price}€
${order.modifiers.join(", ")}
`);
  }

  render();
};

// =====================
// BUTTONS
// =====================
document.getElementById("start").onclick = () => recognition.start();
document.getElementById("stop").onclick = () => recognition.stop();

// =====================
// INIT
// =====================
loadData();

</script>

</body>
</html>
