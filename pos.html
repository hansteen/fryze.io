<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<title>POS Fix Total</title>

<style>
body { font-family: Arial; margin: 0; background:#f4f4f4; }
header { background:#111; color:#fff; padding:10px; }
button { padding:8px; margin-right:5px; }

.container { display:grid; grid-template-columns:1fr 1fr 1fr; height:90vh; }

.panel { background:#fff; padding:10px; overflow:auto; border-right:1px solid #ddd; }
.center { background:#fafafa; padding:10px; border-right:1px solid #ddd; }
.right { background:#fff; padding:10px; }

.item { padding:5px; border-bottom:1px solid #eee; }
.order-item { padding:5px; border-left:3px solid blue; margin-bottom:5px; }

.bon { background:#fff8dc; padding:10px; margin-bottom:10px; white-space:pre-wrap; border-left:4px solid gold; }
</style>
</head>

<body>

<header>
?? POS Fix
<button id="start">Start</button>
<button id="stop">Stop</button>
<button id="finish">Bestellung abschließen</button>
</header>

<div class="container">

<div class="panel">
<h3>Artikel</h3>
<div id="articles"></div>

<h3>Modifier</h3>
<div id="modifiers"></div>
</div>

<div class="center">
<h3>Bestellung</h3>
<div id="order"></div>
</div>

<div class="right">
<h3>Bons</h3>
<div id="bons"></div>
</div>

</div>

<script>

const SHEET_ID = "1yCC-8iwWWHPUejZcoc92U-Qy3RMPa1s2nUswYrsLYx4";
const ARTICLE_URL = `https://opensheet.elk.sh/${SHEET_ID}/Artikel`;
const MODIFIER_URL = `https://opensheet.elk.sh/${SHEET_ID}/Modifier`;

let articles = [];
let modifiers = [];

let currentOrder = { items: [] };
let bons = [];
let bonCounter = 1;

// LOAD
async function loadData() {
  articles = await fetch(ARTICLE_URL).then(r => r.json());
  modifiers = await fetch(MODIFIER_URL).then(r => r.json());

  articles = articles.map(a => ({
    name: a.Name,
    price: Number(a.Preis),
    voice: a.VoiceAlias
  }));

  modifiers = modifiers.map(m => ({
    name: m.Name,
    price: Number(m.Preis || 0),
    voice: m.VoiceAlias
  }));

  render();
}

// RENDER
function render() {

  document.getElementById("articles").innerHTML =
    articles.map(a => `<div class="item">${a.name} (${a.price}€)</div>`).join("");

  document.getElementById("modifiers").innerHTML =
    modifiers.map(m => `<div class="item">${m.name} (+${m.price}€)</div>`).join("");

  document.getElementById("order").innerHTML =
    currentOrder.items.map(i =>
      `<div class="order-item">
        ${i.qty}x ${i.name} (${i.price}€)
      </div>`
    ).join("");
}

// TOTAL (FIXED)
function calcTotal(order) {
  let total = 0;

  order.items.forEach(i => {
    total += Number(i.price) * Number(i.qty);

    i.modifiers.forEach(m => {
      total += Number(m.price || 0);
    });
  });

  return total.toFixed(2);
}

// CLOSE ORDER
function closeOrder() {

  let bon = `BON #${bonCounter}\n-----------------\n`;

  currentOrder.items.forEach(i => {
    bon += `${i.qty}x ${i.name} (${i.price}€)\n`;

    if (i.modifiers.length) {
      bon += ` + ${i.modifiers.map(m => m.name).join(", ")}\n`;
    }
  });

  bon += `-----------------\nTOTAL: ${calcTotal(currentOrder)}€\n`;

  bons.push(bon);
  bonCounter++;

  currentOrder = { items: [] };

  render();
}

// VOICE
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = "de-DE";
recognition.continuous = true;

recognition.onresult = (e) => {

  const text = e.results[e.results.length - 1][0].transcript.toLowerCase();

  if (text.includes("bestellung abschließen")) {
    closeOrder();
    return;
  }

  const article = articles.find(a => text.includes(a.name.toLowerCase()));
  const mod = modifiers.find(m => text.includes(m.name.toLowerCase()));

  if (article) {
    currentOrder.items.push({
      name: article.name,
      price: article.price,
      qty: 1,
      modifiers: []
    });
  }

  if (mod && currentOrder.items.length) {
    currentOrder.items[currentOrder.items.length - 1].modifiers.push(mod);
  }

  render();
};

// BUTTONS
document.getElementById("start").onclick = () => recognition.start();
document.getElementById("stop").onclick = () => recognition.stop();
document.getElementById("finish").onclick = closeOrder;

// INIT
loadData();

</script>

</body>
</html>
