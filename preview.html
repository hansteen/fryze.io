<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Voice POS v2</title>
<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px}
.box{background:#fff;border-radius:10px;padding:15px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.row{display:flex;justify-content:space-between;margin:6px 0}
.small{font-size:12px;color:#666}
button{padding:10px 14px;margin-right:8px}
</style></head><body>
<h2>Voice POS mit Parsing Update</h2>
<button onclick="startVoice()">ðŸŽ¤ Start</button>
<button onclick="stopVoice()">ðŸ›‘ Stop</button>
<div id="status">bereit</div>
<div id="speech">â€”</div><br>

<div class="grid">
<div class="box"><h3>Artikel</h3><div id="menu"></div></div>
<div class="box"><h3>Modifier</h3><div id="modifierList"></div></div>
<div class="box"><h3>Bestellung</h3><div id="order"></div><h3 id="sum">0,00 â‚¬</h3></div>
<div class="box"><h3>Bons</h3><div id="receipts"></div></div>
</div>

<script>
const SHEET_ID="1yCC-8iwWWHPUejZcoc92U-Qy3RMPa1s2nUswYrsLYx4";
const ARTICLE_URL=`https://opensheet.elk.sh/${SHEET_ID}/Artikel`;
const MODIFIER_URL=`https://opensheet.elk.sh/${SHEET_ID}/Modifier`;

let artikel={},modifier={},modifierDisplay=[];
let positions=[],history=[],orderNo=1;
let recognition,isListening=false,lastText="";

const speechFixes = {
 "mario":"mayo","majo":"mayo","neuen":"neun","neuem":"neun",
 "schafe":"scharf","achten":"acht","dÃ¶nern":"dÃ¶ner"
};

const numberMap = {
 "eins":"1","ein":"1","zwei":"2","drei":"3","vier":"4",
 "fÃ¼nf":"5","sechs":"6","sieben":"7","acht":"8","achten":"8",
 "neun":"9","neuen":"9","neuem":"9"
};

function normalizeSpeech(text){
 text=normalizeSpeech(text);

 Object.keys(speechFixes).forEach(k=>{
   text=text.replaceAll(k,speechFixes[k]);
 });

 Object.keys(numberMap).forEach(k=>{
   text=text.replaceAll(k,numberMap[k]);
 });

 return text;
}

const eur=v=>v.toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2})+" â‚¬";

async function init(){
 const a=await fetch(ARTICLE_URL).then(r=>r.json());
 a.forEach(x=>artikel[x.Nummer]={name:x.Name,price:+x.Preis,cat:x.Kategorie||""});

 const m=await fetch(MODIFIER_URL).then(r=>r.json());
 m.forEach(x=>{
   modifierDisplay.push(x);
   (x.VoiceAlias||"").split(",").forEach(v=>{
     modifier[v.trim().toLowerCase()]={name:x.Name,price:+x.Preis||0};
   });
 });

 renderMenu();
 renderModifiers();
}

function renderMenu(){
 let h="";
 Object.keys(artikel).forEach(id=>{
   const a=artikel[id];
   h+=`<div class="row"><span>${id} ${a.name}</span><span>${eur(a.price)}</span></div>`;
 });
 menu.innerHTML=h;
}

function renderModifiers(){
 let h="";
 modifierDisplay.forEach(m=>{
   h+=`<div style="margin-bottom:8px">
      <div class="row">
        <span>${m.ID||""} ${m.Name}</span>
        <span>${eur(+m.Preis||0)}</span>
      </div>
      <div class="small">${m.VoiceAlias||""}</div>
   </div>`;
 });
 modifierList.innerHTML=h;
}

function renderOrder(){
 let total=0,html="";
 positions.forEach(p=>{
   const item=artikel[p.id];
   if(!item) return;

   let modTotal=0;
   let modHtml="";

   p.mods.forEach(m=>{
      modTotal+=m.price;
      modHtml+=`<div class="small">+ ${m.name} (${eur(m.price)})</div>`;
   });

   const posTotal=(item.price+modTotal)*p.qty;
   total+=posTotal;

   html+=`<div style="border-bottom:1px solid #ddd;padding:8px 0">
      <div class="row">
        <span>${p.qty}x ${item.name}</span>
        <span>${eur(posTotal)}</span>
      </div>
      ${modHtml}
   </div>`;
 });

 order.innerHTML=html;
 sum.innerText=eur(total);
}

function addPosition(id,qty,mods){
 positions.push({id,qty,mods});
 history.push({id,qty,mods});
 renderOrder();
}

function parse(text){

    console.log("RAW:", text);

    text = text.toLowerCase();

    // -------------------
    // POS Interpretation
    // -------------------

    const replacements = {

        "mario":"mayo",
        "majo":"mayo",

        "neuen":"9",
        "neuem":"9",
        "neun":"9",

        "achten":"8",
        "acht":"8",

        "eins":"1",
        "ein":"1",

        "zweimal":"2 mal",
        "dreimal":"3 mal",
        "viermal":"4 mal",

        "nummer":"",

        "mit ":""
    };

    Object.keys(replacements).forEach(k => {

        text = text.replaceAll(
            k,
            replacements[k]
        );
    });

    console.log("NORMALIZED:", text);

    // -------------------
    // Commands
    // -------------------

    if(text.includes("korrektur")){

        history.pop();
        positions.pop();

        renderOrder();
        return;
    }

    if(text.includes("bestellung abschließen")){

        receipts.innerHTML =
        `<div>
            <b>Bestellung ${orderNo}</b>
            ${order.innerHTML}
            <b>Gesamt ${sum.innerText}</b>
            <hr>
        </div>`
        + receipts.innerHTML;

        orderNo++;

        positions = [];
        history = [];

        renderOrder();

        return;
    }

    // -------------------
    // Modifier detection
    // -------------------

    let mods = [];

    Object.keys(modifier).forEach(key => {

        if(text.includes(key)){

            mods.push(modifier[key]);
        }
    });

    // -------------------
    // Quantity
    // -------------------

    let qty = 1;

    const qtyMatch =
        text.match(/(\d+)\s*mal/);

    if(qtyMatch){

        qty =
            parseInt(qtyMatch[1]);
    }

    // -------------------
    // Article detection
    // -------------------

    let articleId = null;

    Object.keys(artikel).forEach(id => {

        const regex =
            new RegExp(`\\b${id}\\b`);

        if(regex.test(text)){

            articleId = id;
        }
    });

    if(articleId){

        addPosition(
            articleId,
            qty,
            mods
        );
    }
}

function startVoice(){
 const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
 recognition=new SR();
 recognition.lang="de-DE";
 recognition.continuous=true;

 recognition.onresult=e=>{
   const result=e.results[e.results.length-1][0];
const confidence=result.confidence || 1;
if(confidence < 0.45) return;
const t=result.transcript.trim();
   if(t===lastText) return;
   lastText=t;
   speech.innerText=t;
   parse(t);
 };

 recognition.onstart=()=>status.innerText="ðŸŽ¤ aktiv";
 recognition.onend=()=>{ if(isListening) recognition.start(); };

 isListening=true;
 recognition.start();
}

function stopVoice(){
 isListening=false;
 recognition&&recognition.stop();
 status.innerText="ðŸ›‘ gestoppt";
}

init();
</script></body></html>
